name: Test Telegram Proxy

on:
  workflow_run:
    workflows: ["Telegram Proxy Loader"]
    types:
      - completed

permissions:
  contents: write

jobs:
  run-test:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run testproto.py
        run: |
          python testproto.py

      - name: Commit proxies-tested.txt
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add proxies-tested.txt

          git diff --cached --quiet && exit 0

          git commit -m "Update proxies-tested.txt [auto]"
          git push

      - name: Upload proxies-tested.txt
        uses: actions/upload-artifact@v4
        with:
          name: proxies-tested
          path: proxies-tested.txt
